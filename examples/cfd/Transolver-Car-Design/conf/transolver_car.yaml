# 模型配置
model:
  name: "Transolver"  # 模型名称，对应特定模型实现
  specific_params:    # 各模型独有参数
    Transolver:       # Transolver 模型参数
      n_hidden: 256   # 隐藏层维度
      n_layers: 8     # Transformer 层数
      space_dim: 7    # 空间特征维度 (位置 + SDF + 法向量)
      fun_dim: 0      # 函数特征维度
      n_head: 8       # 多头注意力头数
      mlp_ratio: 2    # MLP 扩展比例
      out_dim: 4      # 输出维度 (3维速度 + 1维压力)
      slice_num: 32   # 物理切片的数量
      unified_pos: 0  # 是否使用统一位置编码
      cfd_mesh: False # 是否使用 CFD 网格
      r: 0.2          # 图构建时的邻域半径 (cfd_mesh=False 时使用)

# 数据处理配置
datapipe:
  name: "ShapeNetCar"      # 数据管道名称
  task: "Transolver-Car-Design"  # 任务标识
  
  verbose: True  # 是否显示详细信息
  
  # 数据源设置
  source:
    data_dir: "/path/to/training_data"         # 原始数据目录
    preprocessed_save_dir: "/path/to/preprocessed_data"  # 预处理数据保存目录
    stats_dir: "/path/to/stats"      # 统计信息目录 (存储 mean/std.npy)
    preprocessed: 1                  # 是否使用预处理数据 (1: 是, 0: 否)
  
  # 数据划分
  data:
    splits:
      fold_id: 0  # 交叉验证折数，用于测试集划分
  
  # 数据加载器设置
  dataloader:
    batch_size: 1         # 批大小
    num_workers: 4        # 数据加载进程数
    pin_memory: True      # 是否使用内存固定 (提升GPU传输效率)

# 训练配置
training:
  gpuid: 0           # 单卡训练时的 GPU ID
  max_epoch: 200     # 最大训练轮数
  patience: 50       # 早停耐心值 (验证损失不改进的轮数)
  
  lr: 0.001          # 初始学习率
  
  # 损失函数设置
  loss_criterion: 'MSE'  # 损失函数类型: 'MSE' 或 'MAE'
  loss_weight: 0.5       # 压力损失项的权重
  
  checkpoint_dir: "./checkpoints/ShapeNetCar"  # 模型保存目录
  val_iter: 1  # 验证频率 (每 N 轮验证一次)

# 推理配置
inference:
  gpuid: 0  # 推理时使用的 GPU ID
  
  result_dir: "./results/ShapeNetCar"  # 结果保存目录
  
  save_vtk: True     # 是否保存 VTK 格式结果
  visualize: True    # 是否生成可视化图片 (需要 save_vtk=True)
