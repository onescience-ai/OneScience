# CFD涡流数据集配置示例

dataset:
  name: "VortexShedding"
  domain: "cfd"
  task: "flow_field_prediction"
  
  source:
    type: "tfrecord"
    path: "/data/cfd/vortex_shedding"
    split: "train"
  
  data:
    variables:
      - "velocity"
      - "pressure"
      - "vorticity"
    
    num_samples: 1000
    shuffle: true
    random_seed: 42
    
    extra:
      mesh_type: "unstructured"
      num_steps: 600
      noise_std: 0.02
      boundary_conditions:
        inlet: "velocity"
        outlet: "pressure"
        walls: "no_slip"
  
  transforms:
    - type: "Normalize"
      params:
        mean: [0.0, 0.0, 0.0]
        std: [1.0, 1.0, 1.0]
    - type: "ToTensor"
  
  verbose: true
  cache: false

dataloader:
  batch_size: 8
  num_workers: 2
  pin_memory: true
  drop_last: true
  collate_fn: "graph_collate"  # 用于图数据
  
  distributed:
    enabled: false

