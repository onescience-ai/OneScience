        role: 稀疏 MoE 语言模型
        architecture: decoder
        experts: 64

      - model: Mixtral 8x7B
        year: 2023
        role: 开源 MoE 模型
        architecture: decoder
        experts: 8
        top_k: 2

      - model: DeepSeek-V2
        year: 2024
