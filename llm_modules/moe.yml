        top_k: 4

      - model: Arctic
        year: 2024
        role: Snowflake 混合 MoE
        architecture: decoder
        experts: 128
        top_k: 2


    model_usage_details:

      Switch Transformer:

        experts: 2048
        top_k: 1
        routing: token-level

      Mixtral:

        experts: 8
        top_k: 2
        routing: token-level
        expert_type: SwiGLU

      DeepSeek-V2:

        experts: 160
        top_k: 6
        routing: shared_expert + routed_expert


    best_practices:

      - 使用 top_k=2 平衡性能和效率
      - 添加 load balancing loss 防止专家崩溃
      - 使用 expert dropout 提升泛化
      - 考虑使用 shared expert 处理通用特征


    anti_patterns:

      - top_k=1 容易导致 routing collapse
      - 专家数过多导致训练不充分
      - 忽略 load balance 导致专家利用不均


