          - Attention
          - MoE
          - ResidualAdd

      mixture_of_adapters:

        pipeline:
          - BaseModel
          - MixtureOfAdapters


    design_patterns:

      moe_transformer_block:

        structure:
          - Attention
          - Add
          - LayerNorm
          - MoE
          - Add
          - LayerNorm


